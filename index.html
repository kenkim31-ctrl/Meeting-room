<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A조 회의실 예약 & 근태</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#F8FAFC; min-height:100vh; }
#login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-card { background:#fff; border-radius:16px; padding:48px 36px; box-shadow:0 4px 24px rgba(0,0,0,.1); width:320px; text-align:center; }
.login-card h1 { font-size:21px; font-weight:700; color:#0F172A; margin:10px 0 6px; }
.login-card p { font-size:13px; color:#64748B; margin-bottom:26px; }
.login-card input { width:100%; padding:12px 14px; font-size:15px; border:1.5px solid #E2E8F0; border-radius:8px; outline:none; margin-bottom:12px; font-family:inherit; }
.login-card input:focus { border-color:#2563EB; }
.login-card button { width:100%; padding:12px; background:#2563EB; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
#app-screen { display:none; }
header { background:#fff; border-bottom:1px solid #E2E8F0; padding:13px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.hl { display:flex; align-items:center; gap:8px; }
.hl h2 { font-size:15px; font-weight:700; color:#0F172A; }
.badge { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid; }
.ok { background:#F0FDF4; color:#15803D; border-color:#BBF7D0; }
.err { background:#FEF2F2; color:#DC2626; border-color:#FECACA; }
.hr { display:flex; align-items:center; gap:8px; }
.avatar { width:27px; height:27px; border-radius:50%; background:#2563EB; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.uname { font-size:13px; font-weight:600; color:#334155; }
.chg { background:none; border:none; color:#94A3B8; cursor:pointer; font-size:11px; }

/* 탭 */
.tabbar { background:#fff; border-bottom:1px solid #E2E8F0; display:flex; position:sticky; top:53px; z-index:99; }
.tab { flex:1; padding:13px; text-align:center; font-size:14px; font-weight:600; color:#94A3B8; cursor:pointer; border-bottom:2.5px solid transparent; }
.tab.active { color:#2563EB; border-bottom-color:#2563EB; }

main { max-width:900px; margin:0 auto; padding:18px 12px; }
.page { display:none; }
.page.active { display:block; }

/* 회의실 */
.dtabs { display:flex; gap:5px; margin-bottom:18px; overflow-x:auto; padding-bottom:4px; }
.dtab { padding:7px 11px; border-radius:8px; border:1.5px solid #E2E8F0; background:#fff; color:#475569; font-size:11px; cursor:pointer; white-space:nowrap; font-family:inherit; }
.dtab.active { background:#2563EB; color:#fff; border-color:#2563EB; font-weight:700; }
.legend { display:flex; gap:12px; margin-bottom:12px; font-size:11px; color:#64748B; flex-wrap:wrap; }
.ldot { width:10px; height:10px; border-radius:3px; border:1px solid; flex-shrink:0; }
.rooms { display:flex; flex-direction:column; gap:12px; }
.rcard { background:#fff; border-radius:12px; border:1px solid #E2E8F0; overflow:hidden; }
.rhdr { padding:11px 16px; border-bottom:1px solid #F1F5F9; display:flex; align-items:center; gap:9px; }
.rdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.rname { font-size:14px; font-weight:700; color:#0F172A; }
.slots { padding:10px 12px; display:flex; gap:5px; flex-wrap:wrap; }
.slot { min-width:58px; padding:7px 5px; border-radius:8px; border:1.5px solid #E2E8F0; background:#F8FAFC; text-align:center; cursor:pointer; user-select:none; transition:background .12s; }
.slot-h { font-size:11px; font-weight:600; }
.slot-u { font-size:9px; margin-top:2px; opacity:.85; }

/* 근태 캘린더 */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-nav button { background:#fff; border:1.5px solid #E2E8F0; border-radius:8px; padding:6px 14px; font-size:16px; cursor:pointer; color:#475569; font-family:inherit; }
.cal-title { font-size:17px; font-weight:700; color:#0F172A; }
.att-legend { display:flex; gap:10px; margin-bottom:12px; font-size:11px; flex-wrap:wrap; }
.att-chip { display:inline-flex; align-items:center; gap:4px; }
.att-cdot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
.cal { background:#fff; border-radius:12px; border:1px solid #E2E8F0; overflow:hidden; }
.cal-week { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-wd { padding:9px 0; text-align:center; font-size:11px; font-weight:700; color:#64748B; background:#F8FAFC; border-bottom:1px solid #E2E8F0; }
.cal-wd.sun { color:#DC2626; }
.cal-wd.sat { color:#2563EB; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-cell { min-height:78px; border-right:1px solid #F1F5F9; border-bottom:1px solid #F1F5F9; padding:5px 4px; cursor:pointer; position:relative; }
.cal-cell:nth-child(7n) { border-right:none; }
.cal-cell.empty { background:#FBFCFD; cursor:default; }
.cal-cell.today { background:#EFF6FF; }
.cal-date { font-size:11px; font-weight:600; color:#475569; margin-bottom:3px; }
.cal-date.sun { color:#DC2626; }
.cal-date.sat { color:#2563EB; }
.cal-ev { font-size:9px; padding:1px 4px; border-radius:4px; margin-bottom:2px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.mbg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center; z-index:1000; }
.mbg.show { display:flex; }
.modal { background:#fff; border-radius:14px; padding:28px 24px; width:300px; box-shadow:0 8px 40px rgba(0,0,0,.18); }
.mico { font-size:24px; margin-bottom:8px; }
.modal h3 { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:7px; }
.modal p { font-size:13px; color:#475569; line-height:1.7; margin-bottom:16px; }
.mbtns { display:flex; gap:9px; }
.mbtns button { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.bcl { background:#F1F5F9; color:#475569; }
.bbk { background:#2563EB; color:#fff; }
.bcc { background:#DC2626; color:#fff; }
.type-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.type-btn { padding:11px; border:2px solid #E2E8F0; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; background:#fff; font-family:inherit; color:#475569; }
.type-btn.sel { border-color:#2563EB; background:#EFF6FF; color:#2563EB; }
.my-ev-list { margin-bottom:16px; }
.my-ev { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:8px; margin-bottom:6px; font-size:12px; }
.del-x { background:none; border:none; color:#DC2626; cursor:pointer; font-size:13px; font-weight:700; }

#toast { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; padding:11px 20px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.2); z-index:2000; white-space:nowrap; }
#credit { position:fixed; bottom:8px; right:12px; font-size:13px; color:#CBD5E1; z-index:50; }
#spinner { text-align:center; padding:40px; color:#94A3B8; font-size:13px; }
</style>
</head>
<body>

<div id="login-screen">
<div class="login-card">
<div style="font-size:36px">🏢</div>
<h1>A조 업무 관리</h1>
<p>비밀번호를 입력하고 입장하세요</p>
<input id="ni" type="password" inputmode="numeric" placeholder="비밀번호 4자리" maxlength="4"/>
<button id="lb">입장하기</button>
</div>
</div>

<div id="app-screen">
<header>
<div class="hl">
<span style="font-size:17px">🏢</span>
<h2>A조 업무관리</h2>
<span id="sbadge" class="badge err">🔴 연결 중...</span>
</div>
<div class="hr">
<button class="chg" id="logoutBtn">나가기</button>
</div>
</header>

<div class="tabbar">
<div class="tab active" id="tab-room" onclick="switchTab('room')">회의실 예약</div>
<div class="tab" id="tab-att" onclick="switchTab('att')">근태 관리</div>
</div>

<main>
<!-- 회의실 예약 페이지 -->
<div class="page active" id="page-room">
<div class="dtabs" id="dtabs"></div>
<div class="legend">
<div style="display:flex;align-items:center;gap:4px"><div class="ldot" style="background:#F8FAFC;border-color:#E2E8F0"></div>예약 가능</div>
<div style="display:flex;align-items:center;gap:4px"><div class="ldot" style="background:#DBEAFE;border-color:#2563EB"></div>예약됨</div>
<div style="display:flex;align-items:center;gap:4px"><div class="ldot" style="background:#F1F5F9;border-color:#CBD5E1"></div>예약 불가</div>
</div>
<div id="spinner">데이터 불러오는 중...</div>

<!-- 근태 관리 페이지 -->
<div class="page" id="page-att">

<div class="cal-week">
<div class="cal-wd sun">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div>
<div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div><div class="cal-wd sat">토</div>
</div>
<div class="cal-grid" id="calGrid"></div>
</div>
</div>
</main>
</div>

<!-- 회의실 모달 -->
<div class="mbg" id="mbg">
<div class="modal">
<div class="mico" id="mico"></div>
<h3 id="mtitle"></h3>
<p id="mbody"></p>
<input id="mname" type="text" maxlength="30" placeholder="회의명 / 예약자 입력"
style="width:100%;padding:11px 13px;font-size:14px;border:1.5px solid #E2E8F0;border-radius:8px;outline:none;margin-bottom:16px;font-family:inherit;display:none"/>
<div class="mbtns">
<button class="bcl" id="mclose">닫기</button>
<button id="mconfirm"></button>
</div>
</div>
</div>

<!-- 근태 모달 -->
<div class="mbg" id="ambg">
<div class="modal">
<h3 id="amtitle"></h3>
<div class="my-ev-list" id="myEvList"></div>
<p style="margin-bottom:8px;font-weight:600;color:#334155">근태 추가</p>
<input id="amname" type="text" maxlength="20" placeholder="이름 입력"
style="width:100%;padding:11px 13px;font-size:14px;border:1.5px solid #E2E8F0;border-radius:8px;outline:none;margin-bottom:10px;font-family:inherit"/>
<div class="type-grid" id="typeGrid"></div>

</div>
</div>

<div id="credit">by kenkim · v2.2</div>

<script>
var DB_URL = "https://dsat-meeting-room-default-rtdb.asia-southeast1.firebasedatabase.app";
var API_KEY = "AIzaSyA19p683iO6_oSsvU30oqVIfDUlv871B8w";
var PASSWORD = "1959";

var ROOMS = [
{id:"3", name:"회의실 3", color:"#2563EB", light:"#DBEAFE", pmOnly:true},
{id:"4", name:"회의실 4", color:"#059669", light:"#D1FAE5", pmOnly:false}
];
var SLOTS = [];
(function(){
for (var h = 8; h <= 17; h++) { SLOTS.push(h*60); SLOTS.push(h*60+30); }
})();

var ATT_TYPES = [
{id:"annual", name:"연차", color:"#2563EB"},
{id:"edu", name:"교육", color:"#059669"},
{id:"health", name:"건강검진", color:"#D97706"},
{id:"family", name:"패밀리데이", color:"#7C3AED"}
];

var userName = "";
var selDate = "";
var bookings = {};
var pending = null;
var pollTimer = null;

var attData = {};
var calYear = 0, calMonth = 0;
var attSelDate = "";
var attSelType = null;
var curTab = "room";

function pad(n) { return String(n).padStart(2,"0"); }

function getToday() {
var d = new Date();
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}

function getDates() {
var arr = [];
var t = new Date();
var added = 0;
var i = 0;
while (added < 40) {
var d = new Date(t);
d.setDate(t.getDate() + i);
i++;
var wd = d.getDay();
if (wd === 0 || wd === 6) continue; // 일/토 제외
arr.push(d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()));
added++;
}
return arr;
}

function dateLabel(s) {
var p = s.split("-");
var d = new Date(+p[0], +p[1]-1, +p[2]);
var days = ["일","월","화","수","목","금","토"];
return (+p[1])+"/"+( +p[2])+" ("+days[d.getDay()]+")"+(s===getToday()?" 오늘":"");
}

function fmtH(mins) { return pad(Math.floor(mins/60))+":"+pad(mins%60); }

var toastTimer;
function showToast(msg, type) {
var el = document.getElementById("toast");
el.textContent = msg;
el.style.background = (type==="error") ? "#DC2626" : (type==="info") ? "#475569" : "#059669";
el.style.display = "block";
clearTimeout(toastTimer);
toastTimer = setTimeout(function(){ el.style.display="none"; }, 3000);
}

function setStatus(ok) {
var el = document.getElementById("sbadge");
el.textContent = ok ? "🟢 연결됨" : "🔴 연결 끊김";
el.className = "badge " + (ok ? "ok" : "err");
}

/* ===== Firebase 통신 (회의실) ===== */
function fetchBookings(date, cb) {
var xhr = new XMLHttpRequest();
xhr.open("GET", DB_URL+"/bookings/"+date+".json?key="+API_KEY, true);
xhr.onload = function() {
if (xhr.status === 200) {
try { cb(null, JSON.parse(xhr.responseText) || {}); }
catch(e) { cb(e, {}); }
} else { cb(new Error("HTTP "+xhr.status), {}); }
};
xhr.onerror = function() { cb(new Error("Network error"), {}); };
xhr.send();
}

function setSlot(date, key, value, cb) {
var xhr = new XMLHttpRequest();
var url = DB_URL+"/bookings/"+date+"/"+key+".json?key="+API_KEY;
if (value === null) { xhr.open("DELETE", url, true); }
else { xhr.open("PUT", url, true); xhr.setRequestHeader("Content-Type","application/json"); }
xhr.onload = function() { cb((xhr.status===200||xhr.status===204) ? null : new Error("HTTP "+xhr.status)); };
xhr.onerror = function() { cb(new Error("Network error")); };
xhr.send(value===null ? null : JSON.stringify(value));
}

/* ===== Firebase 통신 (근태) ===== */
function fetchAtt(ym, cb) {
var xhr = new XMLHttpRequest();
xhr.open("GET", DB_URL+"/attendance/"+ym+".json?key="+API_KEY, true);
xhr.onload = function() {
if (xhr.status === 200) {
try { cb(null, JSON.parse(xhr.responseText) || {}); }
catch(e) { cb(e, {}); }
} else { cb(new Error("HTTP "+xhr.status), {}); }
};
xhr.onerror = function() { cb(new Error("Network error"), {}); };
xhr.send();
}

function pushAtt(ym, record, cb) {
var xhr = new XMLHttpRequest();
xhr.open("POST", DB_URL+"/attendance/"+ym+".json?key="+API_KEY, true);
xhr.setRequestHeader("Content-Type","application/json");
xhr.onload = function() { cb((xhr.status===200) ? null : new Error("HTTP "+xhr.status)); };
xhr.onerror = function() { cb(new Error("Network error")); };
xhr.send(JSON.stringify(record));
}

function delAtt(ym, id, cb) {
var xhr = new XMLHttpRequest();
xhr.open("DELETE", DB_URL+"/attendance/"+ym+"/"+id+".json?key="+API_KEY, true);
xhr.onload = function() { cb((xhr.status===200||xhr.status===204) ? null : new Error("HTTP "+xhr.status)); };
xhr.onerror = function() { cb(new Error("Network error")); };
xhr.send();
}

/* ===== 폴링 ===== */
function startPoll() {
stopPoll();
loadAll();
pollTimer = setInterval(loadAll, 5000);
}
function stopPoll() { clearInterval(pollTimer); }

function loadAll() {
if (curTab === "room") { loadRoom(); }
else { loadAtt(); }
}

function loadRoom() {
fetchBookings(selDate, function(err, data) {
if (err) { setStatus(false); return; }
bookings = data;
setStatus(true);
document.getElementById("spinner").style.display = "none";
renderRooms();
});
}

function loadAtt() {
var ym = calYear+"-"+pad(calMonth+1);
fetchAtt(ym, function(err, data) {
if (err) { setStatus(false); return; }
attData = data;
setStatus(true);
renderCalendar();
});
}

/* ===== 로그인 ===== */
function login() {
var v = document.getElementById("ni").value.trim();
if (v !== PASSWORD) { alert("비밀번호가 올바르지 않습니다."); return; }
selDate = getToday();
var now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();
document.getElementById("login-screen").style.display = "none";
document.getElementById("app-screen").style.display = "block";
buildTabs();
buildAttLegend();
startPoll();
}

document.getElementById("lb").onclick = login;
document.getElementById("ni").onkeydown = function(e) { if (e.key === "Enter") login(); };

document.getElementById("logoutBtn").onclick = function() {
stopPoll();
document.getElementById("app-screen").style.display = "none";
document.getElementById("login-screen").style.display = "flex";
document.getElementById("ni").value = "";
};

/* ===== 탭 전환 ===== */
function switchTab(tab) {
curTab = tab;
document.getElementById("tab-room").className = "tab" + (tab==="room"?" active":"");
document.getElementById("tab-att").className = "tab" + (tab==="att"?" active":"");
document.getElementById("page-room").className = "page" + (tab==="room"?" active":"");
document.getElementById("page-att").className = "page" + (tab==="att"?" active":"");
loadAll();
}

/* ===== 회의실 ===== */
function buildTabs() {
var wrap = document.getElementById("dtabs");
wrap.innerHTML = "";
var dates = getDates();
for (var i = 0; i < dates.length; i++) {
(function(d) {
var b = document.createElement("button");
b.className = "dtab" + (d===selDate ? " active" : "");
b.textContent = dateLabel(d);
b.onclick = function() { selDate = d; buildTabs(); loadRoom(); };
wrap.appendChild(b);
})(dates[i]);
}
}

function renderRooms() {
var wrap = document.getElementById("rooms");
wrap.innerHTML = "";
for (var ri = 0; ri < ROOMS.length; ri++) {
var room = ROOMS[ri];
var card = document.createElement("div");
card.className = "rcard";
var hdr = document.createElement("div");
hdr.className = "rhdr";
hdr.style.background = room.light;
hdr.innerHTML = '<div class="rdot" style="background:'+room.color+'"></div>'
+ '<span class="rname">'+room.name+'</span>'
+ (room.pmOnly ? '<span style="font-size:11px;color:#64748B;margin-left:4px">오후만 예약가능</span>' : '');
card.appendChild(hdr);
var sw = document.createElement("div");
sw.className = "slots";
for (var hi = 0; hi < SLOTS.length; hi++) {
(function(mins, rm) {
var blocked = rm.pmOnly && mins < 13*60;
var key = rm.id+"_"+mins;
var bk = bookings[key] || null;
var bg = blocked ? "#F1F5F9" : (bk ? rm.light : "#F8FAFC");
var bc = blocked ? "#CBD5E1" : (bk ? rm.color : "#E2E8F0");
var fc = blocked ? "#CBD5E1" : (bk ? rm.color : "#475569");
var s = document.createElement("div");
s.className = "slot";
s.style.background = bg;
s.style.borderColor = bc;
s.style.cursor = blocked ? "default" : "pointer";
s.innerHTML = '<div class="slot-h" style="color:'+fc+'">'+fmtH(mins)+'</div>'
+ (blocked ? '<div class="slot-u" style="color:'+fc+'">불가</div>'
: bk ? '<div class="slot-u" style="color:'+fc+'">'+bk.user+'</div>' : "");
if (!blocked) {
s.onmouseover = function() { if (!bk) s.style.background="#EFF6FF"; };
s.onmouseout = function() { if (!bk) s.style.background="#F8FAFC"; };
s.onclick = function() { openModal(rm, mins, bk); };
}
sw.appendChild(s);
})(SLOTS[hi], room);
}
card.appendChild(sw);
wrap.appendChild(card);
}
}

function openModal(room, hour, booking) {
var type = booking ? "cancel" : "book";
pending = {type:type, room:room, hour:hour};
var nameInput = document.getElementById("mname");
document.getElementById("mico").textContent = type==="book" ? "📅" : "🗑️";
document.getElementById("mtitle").textContent = type==="book" ? "회의실 예약" : "예약을 취소하시겠습니까?";
document.getElementById("mbody").innerHTML = "<strong>"+room.name+"</strong><br/>"+selDate+" "+fmtH(hour)+"<br/>"
+(type==="cancel" ? "예약자: <strong>"+booking.user+"</strong>" : "");
if (type==="book") {
nameInput.style.display = "block";
nameInput.value = "";
} else {
nameInput.style.display = "none";
}
var btn = document.getElementById("mconfirm");
btn.textContent = type==="book" ? "예약 확정" : "취소 확인";
btn.className = type==="book" ? "bbk" : "bcc";
document.getElementById("mbg").classList.add("show");
if (type==="book") { setTimeout(function(){ nameInput.focus(); }, 100); }
}

function closeModal() { document.getElementById("mbg").classList.remove("show"); pending = null; }
document.getElementById("mclose").onclick = closeModal;
document.getElementById("mbg").onclick = function(e) { if(e.target===this) closeModal(); };
document.getElementById("mconfirm").onclick = function() {
if (!pending) return;
var type = pending.type, room = pending.room, hour = pending.hour;
var key = room.id+"_"+hour;
if (type==="book") {
var nm = document.getElementById("mname").value.trim();
if (!nm) { alert("회의명 또는 예약자를 입력해주세요."); return; }
var val = {user:nm, bookedAt:new Date().toISOString()};
closeModal();
setSlot(selDate, key, val, function(err) {
if (err) { showToast("오류: "+err.message, "error"); return; }
showToast(room.name+" "+fmtH(hour)+" 예약 완료!", "success");
loadRoom();
});
} else {
closeModal();
setSlot(selDate, key, null, function(err) {
if (err) { showToast("오류: "+err.message, "error"); return; }
showToast("예약이 취소되었습니다.", "info");
loadRoom();
});
}
};

/* ===== 근태 캘린더 ===== */
function typeById(id) {
for (var i=0;i<ATT_TYPES.length;i++) { if (ATT_TYPES[i].id===id) return ATT_TYPES[i]; }
return {id:id, name:id, color:"#64748B"};
}

function buildAttLegend() {
var wrap = document.getElementById("attLegend");
wrap.innerHTML = "";
for (var i=0;i<ATT_TYPES.length;i++) {
var t = ATT_TYPES[i];
var c = document.createElement("span");
c.className = "att-chip";
c.innerHTML = '<span class="att-cdot" style="background:'+t.color+'"></span>'+t.name;
wrap.appendChild(c);
}
}

document.getElementById("prevM").onclick = function() {
calMonth--; if (calMonth<0) { calMonth=11; calYear--; }
loadAtt();
};
document.getElementById("nextM").onclick = function() {
calMonth++; if (calMonth>11) { calMonth=0; calYear++; }
loadAtt();
};

function renderCalendar() {
document.getElementById("calTitle").textContent = calYear+"년 "+(calMonth+1)+"월";
var grid = document.getElementById("calGrid");
grid.innerHTML = "";

var first = new Date(calYear, calMonth, 1);
var startWd = first.getDay();
var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
var todayStr = getToday();

// 날짜별 이벤트 모으기
var byDate = {};
for (var k in attData) {
if (!attData.hasOwnProperty(k)) continue;
var rec = attData[k];
rec._id = k;
if (!byDate[rec.date]) byDate[rec.date] = [];
byDate[rec.date].push(rec);
}

// 앞 빈칸
for (var e=0;e<startWd;e++) {
var emp = document.createElement("div");
emp.className = "cal-cell empty";
grid.appendChild(emp);
}

for (var d=1; d<=daysInMonth; d++) {
(function(day){
var dateStr = calYear+"-"+pad(calMonth+1)+"-"+pad(day);
var wd = new Date(calYear, calMonth, day).getDay();
var cell = document.createElement("div");
cell.className = "cal-cell" + (dateStr===todayStr ? " today" : "");

var dlabel = document.createElement("div");
dlabel.className = "cal-date" + (wd===0?" sun":wd===6?" sat":"");
dlabel.textContent = day;
cell.appendChild(dlabel);

var evs = byDate[dateStr] || [];
for (var i=0;i<evs.length;i++) {
var t = typeById(evs[i].type);
var ev = document.createElement("div");
ev.className = "cal-ev";
ev.style.background = t.color;
ev.textContent = evs[i].user+" "+t.name;
cell.appendChild(ev);
}

cell.onclick = function() { openAttModal(dateStr); };
grid.appendChild(cell);
})(d);
}
}

function openAttModal(dateStr) {
attSelDate = dateStr;
attSelType = null;
var p = dateStr.split("-");
document.getElementById("amtitle").textContent = (+p[1])+"월 "+(+p[2])+"일 근태";
document.getElementById("amname").value = "";

// 그 날 등록된 전체 근태 목록
var listWrap = document.getElementById("myEvList");
listWrap.innerHTML = "";
var list = [];
for (var k in attData) {
if (!attData.hasOwnProperty(k)) continue;
var rec = attData[k];
if (rec.date===dateStr) { rec._id=k; list.push(rec); }
}
if (list.length===0) {
listWrap.innerHTML = '<p style="font-size:12px;color:#94A3B8;margin-bottom:4px">등록된 근태가 없습니다</p>';
} else {
for (var i=0;i<list.length;i++) {
(function(rec){
var t = typeById(rec.type);
var row = document.createElement("div");
row.className = "my-ev";
row.style.background = t.color+"22";
row.innerHTML = '<span style="color:'+t.color+';font-weight:700">'+rec.user+' · '+t.name+'</span>';
var x = document.createElement("button");
x.className = "del-x";
x.textContent = "삭제";
x.onclick = function() { removeAtt(rec._id); };
row.appendChild(x);
listWrap.appendChild(row);
})(list[i]);
}
}

// 유형 버튼
var tg = document.getElementById("typeGrid");
tg.innerHTML = "";
for (var j=0;j<ATT_TYPES.length;j++) {
(function(t){
var b = document.createElement("button");
b.className = "type-btn";
b.textContent = t.name;
b.onclick = function() {
attSelType = t.id;
var all = tg.getElementsByClassName("type-btn");
for (var m=0;m<all.length;m++) all[m].className="type-btn";
b.className = "type-btn sel";
};
tg.appendChild(b);
})(ATT_TYPES[j]);
}

document.getElementById("ambg").classList.add("show");
}

function closeAttModal() { document.getElementById("ambg").classList.remove("show"); }
document.getElementById("amclose").onclick = closeAttModal;
document.getElementById("ambg").onclick = function(e) { if(e.target===this) closeAttModal(); };

document.getElementById("amadd").onclick = function() {
var nm = document.getElementById("amname").value.trim();
if (!nm) { alert("이름을 입력해주세요."); return; }
if (!attSelType) { alert("근태 유형을 선택해주세요."); return; }
var ym = attSelDate.substring(0,7);
var rec = { user:nm, date:attSelDate, type:attSelType, createdAt:new Date().toISOString() };
closeAttModal();
pushAtt(ym, rec, function(err) {
if (err) { showToast("오류: "+err.message, "error"); return; }
showToast("근태가 등록되었습니다.", "success");
loadAtt();
});
};

function removeAtt(id) {
var ym = attSelDate.substring(0,7);
delAtt(ym, id, function(err) {
if (err) { showToast("오류: "+err.message, "error"); return; }
showToast("삭제되었습니다.", "info");
closeAttModal();
loadAtt();
});
}
</script>
</body>
</html>
